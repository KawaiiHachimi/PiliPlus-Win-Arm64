name: Build for Windows ARM64

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  build-windows-app:
    name: Release Windows ARM64
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 windows
        continue-on-error: true

      - name: Add fastforge and Inno Setup
        shell: pwsh
        run: |
          dart pub global activate fastforge
          choco install innosetup -y

      - name: Add Chinese language file for Inno Setup
        shell: pwsh
        run: |
          Copy-Item "windows/packaging/exe/ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

      - name: Configure ARM64 installer
        shell: pwsh
        run: |
          $template = "windows/packaging/exe/inno_setup.iss"
          (Get-Content $template -Raw).
            Replace("ArchitecturesAllowed=x64", "ArchitecturesAllowed=arm64").
            Replace("ArchitecturesInstallIn64BitMode=x64", "ArchitecturesInstallIn64BitMode=arm64") |
            Set-Content $template -NoNewline

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1

      - name: Build Windows ARM64
        shell: pwsh
        run: |
          fastforge package --platform windows --targets exe --flutter-build-args="dart-define-from-file=pili_release.json"

      - name: Prepare Upload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Release/PiliPlus-Win-Arm64 | Out-Null
          New-Item -ItemType Directory -Force -Path PiliPlus-Win-Arm64-Setup | Out-Null
          Move-Item build/windows/arm64/runner/Release/* Release/PiliPlus-Win-Arm64/
          Move-Item dist/**/*.exe PiliPlus-Win-Arm64-Setup/PiliPlus_windows_${{ env.version }}_arm64_setup.exe

      - name: Compress
        shell: pwsh
        run: |
          Compress-Archive -Path "Release/PiliPlus-Win-Arm64" -DestinationPath "PiliPlus_windows_${{ env.version }}_arm64_portable.zip"

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: |
            PiliPlus_windows_*_arm64_portable.zip
            PiliPlus-Win-Arm64-Setup/PiliPlus_windows_*_arm64_setup.exe

      - name: Upload windows file release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-file-arm64-release
          path: PiliPlus_windows_*_arm64_portable.zip

      - name: Upload windows setup release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-setup-arm64-release
          path: PiliPlus-Win-Arm64-Setup/PiliPlus_windows_*_arm64_setup.exe
